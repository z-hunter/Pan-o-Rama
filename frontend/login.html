<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login - Lokalny Obiektyw</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header img {
      height: 64px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }
    .tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    #register-fields {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <img src="/img/logo.png" alt="Lokalny Obiektyw" />
      <h1>Welcome back</h1>
      <p class="muted">Enter your credentials to access your studio</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="setTab('login')">Login</div>
      <div class="tab" onclick="setTab('register')">Register</div>
    </div>

    <form id="auth-form" onsubmit="handleAuth(event)">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="name@company.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required minlength="8" />
      </div>
      <div id="register-fields">
        <div class="form-group">
          <label for="displayName">Display name</label>
          <input id="displayName" type="text" placeholder="John Doe" />
        </div>
      </div>

      <div class="actions">
        <button type="submit" id="submit-btn" class="btn">Sign in</button>
        <button type="button" class="btn btn-ghost" onclick="resendVerification()">Resend verification email</button>
        <a href="/reset_password.html" class="muted" style="text-align: center;">Forgot your password?</a>
      </div>
    </form>
    
    <div style="margin-top: 24px; text-align: center;">
        <a href="/" class="muted">← Back to studio</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let mode = 'login';

    function setTab(m) {
      mode = m;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab:nth-child(${mode === 'login' ? 1 : 2})`);
      activeTab.classList.add('active');
      
      const regFields = document.getElementById('register-fields');
      const submitBtn = document.getElementById('submit-btn');
      const headerTitle = document.querySelector('.login-header h1');
      const headerSub = document.querySelector('.login-header p');

      if (mode === 'register') {
        regFields.style.display = 'block';
        submitBtn.textContent = 'Create account';
        headerTitle.textContent = 'Create account';
        headerSub.textContent = 'Join Lokalny Obiektyw today';
      } else {
        regFields.style.display = 'none';
        submitBtn.textContent = 'Sign in';
        headerTitle.textContent = 'Welcome back';
        headerSub.textContent = 'Enter your credentials to access your studio';
      }
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const displayName = document.getElementById('displayName').value.trim();

      if (mode === 'login') {
        const out = await apiFetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (!out) return;
        if (out.res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          showToast(out.data.error || 'Login failed', 'error');
        }
      } else {
        const out = await apiFetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, display_name: displayName })
        });
        if (!out) return;
        if (out.res.ok) {
          showToast('Registration successful! Please check your email.', 'success');
          setTab('login');
        } else {
          showToast(out.data.error || 'Registration failed', 'error');
        }
      }
    }

    async function resendVerification() {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showToast('Please enter your email address first', 'error');
        return;
      }
      const out = await apiFetch('/auth/verification/resend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      if (!out) return;
      if (out.res.ok) {
        showToast(out.data.message || 'Verification email sent', 'success');
      } else {
        showToast(out.data.error || 'Failed to resend email', 'error');
      }
    }

    (function init() {
      const p = new URLSearchParams(window.location.search);
      if (p.get('verified') === '1') showToast('Email verified! You can now log in.', 'success');
      if (p.get('reset') === '1') showToast('Password reset successful!', 'success');
    })();
  </script>
</body>
</html>
