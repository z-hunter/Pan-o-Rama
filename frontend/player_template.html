<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Virtual Tour</title>
    <meta name="lokalny_obiektyw_gallery_template" content="custom-pannellum-v6-final-proportions">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #panorama { width: 100vw; height: 100vh; background: #0b0b0b; outline: none; border: none; }
        
        /* Experimental Floor Ring Overlay */
        #overlay-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999999; /* Ultra high z-index */
        }
        #floor-ring {
            position: absolute; width: 120px; height: 120px;
            border: 4px solid #81ecff; border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            box-shadow: 0 0 25px #81ecff, inset 0 0 15px #81ecff;
            opacity: 0; transition: opacity 0.1s linear;
            pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #floor-ring::after { content: ''; width: 10px; height: 10px; background: #81ecff; border-radius: 50%; box-shadow: 0 0 10px #81ecff; }

        /* Custom Hotspots */
        .custom-hotspot { height: 50px; width: 50px; background: rgba(0, 123, 255, 0.4); border: 3px solid #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .custom-hotspot::after { content: ''; width: 15px; height: 15px; border-top: 5px solid #fff; border-right: 5px solid #fff; transform: rotate(-45deg) translate(-2px, 2px); }
        .custom-hotspot:hover { background: rgba(0, 123, 255, 0.8); transform: scale(1.2); box-shadow: 0 0 20px #007bff; }
        
        /* Hide Stock UI */
        .pnlm-load-box, .pnlm-loading, .pnlm-about-msg, .pnlm-control-bar, .pnlm-panorama-info, .pnlm-zoom-controls, .pnlm-fullscreen-controls { display: none !important; }
        
        /* Custom UI */
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; }
        .loading-title { font: 700 16px/1.2 'Segoe UI', sans-serif; color: #dbeaff; margin-bottom: 12px; }
        .loading-progress { width: 300px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .loading-progress .fill { height: 100%; width: 0%; background: #4da3ff; transition: width 0.2s; }
        
        .top-controls { position: fixed; top: 14px; right: 14px; z-index: 10000; display: flex; gap: 10px; }
        .control-btn { height: 44px; padding: 0 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.6); color: #fff; cursor: pointer; font-weight: 700; font-family: 'Segoe UI', sans-serif; backdrop-filter: blur(5px); }
        .control-btn:hover { background: rgba(0,0,0,0.9); border-color: #4da3ff; }
        
        .wm-badge { position: fixed; bottom: 14px; right: 14px; background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 10000; border: 1px solid rgba(255,255,255,0.15); display: none; }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <div id="overlay-container"><div id="floor-ring"></div></div>

    <div class="top-controls">
        <button class="control-btn" id="qualityBtn" style="display:none">WEB</button>
        <button class="control-btn" onclick="toggleFullscreen()">[ ]</button>
    </div>

    <div class="loading-overlay" id="tourLoader">
        <div class="loading-title">LOADING SCENE</div>
        <div class="loading-progress"><div class="fill" id="tourLoaderBar"></div></div>
    </div>

    <div class="wm-badge" id="wmBadge">Created with Pan-o-Rama Free</div>

    <script>
    /*{{TOUR_DATA}}*/

    const sourceData = window.TOUR_DATA || {};
    const scenes = {};
    const hiresMap = {};
    
    let viewer = null;
    let qualityMode = localStorage.getItem("tourQualityMode") || "standard";
    let transitioning = false;

    function init() {
        if (sourceData.watermark) document.getElementById('wmBadge').style.display = 'block';

        sourceData.scenes.forEach(s => {
            const baseAsset = s.web || s.studio_web || s.panorama;
            if (s.panorama && s.panorama !== baseAsset) hiresMap[s.id] = `${s.id}/${s.panorama}`;

            scenes[s.id] = {
                title: s.name,
                type: "equirectangular",
                panorama: `${s.id}/${baseAsset}`,
                haov: (s.haov !== undefined && s.haov !== null) ? s.haov : 360,
                vaov: (s.vaov !== undefined && s.vaov !== null) ? s.vaov : 180,
                hotSpots: (s.hotspots || []).map(hs => ({
                    pitch: hs.pitch,
                    yaw: hs.yaw,
                    cssClass: "custom-hotspot",
                    clickHandlerFunc: (e, args) => smoothSwitch(args.targetId, hs.pitch, hs.yaw, hs.entry_pitch, hs.entry_yaw),
                    clickHandlerArgs: { targetId: hs.target_id }
                }))
            };
        });

        const startId = sourceData.settings.start_scene_id || sourceData.scenes[0].id;
        
        viewer = pannellum.viewer('panorama', {
            "default": {
                "firstScene": startId,
                "sceneFadeDuration": 1000,
                "autoLoad": true,
                "hfov": sourceData.settings.default_hfov || 75,
                "pitch": sourceData.settings.start_pitch || 0,
                "yaw": sourceData.settings.start_yaw || 0,
                "showControls": false,
                "compass": false
            },
            "scenes": scenes
        });

        viewer.on('load', () => {
            transitioning = false;
            document.getElementById('tourLoader').style.display = 'none';
            updateQualityUI();
        });

        initFloorRing();
    }

    function smoothSwitch(targetId, viaPitch, viaYaw, entryPitch, entryYaw) {
        if (transitioning) return;
        transitioning = true;
        const zoomTarget = Math.max(30, viewer.getHfov() - 30);
        viewer.setHfov(zoomTarget, 800);
        viewer.lookAt(viaPitch, viaYaw, zoomTarget, 800);
        setTimeout(() => {
            document.getElementById('tourLoader').style.display = 'flex';
            document.getElementById('tourLoaderBar').style.width = '40%';
            viewer.loadScene(targetId, entryPitch, entryYaw);
        }, 300);
    }

    function updateQualityUI() {
        const btn = document.getElementById('qualityBtn');
        const curId = viewer.getScene();
        if (hiresMap[curId]) {
            btn.style.display = 'block';
            btn.textContent = qualityMode === "ultra" ? "HD" : "WEB";
        } else {
            btn.style.display = 'none';
        }
    }

    document.getElementById('qualityBtn').onclick = () => {
        qualityMode = qualityMode === "ultra" ? "standard" : "ultra";
        localStorage.setItem("tourQualityMode", qualityMode);
        const curId = viewer.getScene();
        const view = { pitch: viewer.getPitch(), yaw: viewer.getYaw(), hfov: viewer.getHfov() };
        const s = sourceData.scenes.find(x => x.id === curId);
        scenes[curId].panorama = (qualityMode === "ultra" && hiresMap[curId]) ? hiresMap[curId] : `${curId}/${s.web || s.studio_web || s.panorama}`;
        viewer.loadScene(curId, view.pitch, view.yaw, view.hfov);
    };

    function initFloorRing() {
        const ring = document.getElementById('floor-ring');
        const panoContainer = document.getElementById('panorama');
        
        window.addEventListener('mousemove', (e) => {
            if (!viewer || transitioning) return;
            const rect = panoContainer.getBoundingClientRect();
            if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
                ring.style.opacity = 0;
                return;
            }
            const coords = viewer.mouseEventToCoords(e);
            if (!coords) return;
            const pitch = coords[0];
            if (pitch < -10) {
                ring.style.opacity = 0.8;
                ring.style.left = e.clientX + 'px';
                ring.style.top = e.clientY + 'px';
                const tilt = Math.max(40, 90 + pitch);
                ring.style.transform = `translate(-50%, -50%) rotateX(${tilt}deg)`;
            } else {
                ring.style.opacity = 0;
            }
        });
        window.addEventListener('mousedown', () => ring.style.opacity = 0);
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
