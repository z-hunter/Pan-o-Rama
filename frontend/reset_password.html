<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reset Password - Lokalny Obiektyw</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .reset-card {
      width: 100%;
      max-width: 400px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="reset-card card">
    <div style="text-align: center; margin-bottom: 32px;">
      <img src="/img/logo.png" alt="LO" style="height: 48px; margin-bottom: 16px;" />
      <h1 id="title">Reset Password</h1>
      <p class="muted" id="subtitle">Enter your email to receive a reset link</p>
    </div>

    <div id="requestMode">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="name@company.com" required />
      </div>
      <button class="btn" style="width: 100%;" onclick="requestReset()">Send reset link</button>
    </div>

    <div id="resetMode" style="display:none;">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" placeholder="••••••••" required minlength="8" />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="••••••••" required />
      </div>
      <button class="btn" style="width: 100%;" onclick="applyReset()">Update password</button>
    </div>

    <div style="margin-top: 24px; text-align: center; display: flex; flex-direction: column; gap: 12px;">
      <a href="/login.html" class="muted">← Back to login</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = (params.get('token') || '').trim();

    async function requestReset() {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showToast('Please enter your email', 'error');
        return;
      }
      const out = await apiFetch('/auth/password/forgot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      if (out && out.res.ok) {
        showToast(out.data.message || 'Reset link sent!', 'success');
      } else {
        showToast(out.data.error || 'Request failed', 'error');
      }
    }

    async function applyReset() {
      const p1 = document.getElementById('newPassword').value;
      const p2 = document.getElementById('confirmPassword').value;
      
      if (p1.length < 8) {
        showToast('Password must be at least 8 characters', 'error');
        return;
      }
      if (p1 !== p2) {
        showToast('Passwords do not match', 'error');
        return;
      }

      const out = await apiFetch('/auth/password/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: p1 })
      });

      if (out && out.res.ok) {
        showToast('Password updated successfully', 'success');
        setTimeout(() => window.location.href = '/login.html?reset=1', 1500);
      } else {
        showToast(out.data.error || 'Reset failed', 'error');
      }
    }

    async function init() {
      if (!token) {
        document.getElementById('title').textContent = 'Forgot Password';
        document.getElementById('subtitle').textContent = 'Enter your email to receive a reset link';
        document.getElementById('requestMode').style.display = 'block';
        document.getElementById('resetMode').style.display = 'none';
        return;
      }

      document.getElementById('title').textContent = 'Set New Password';
      document.getElementById('subtitle').textContent = 'Choose a secure new password for your account';
      document.getElementById('requestMode').style.display = 'none';
      document.getElementById('resetMode').style.display = 'block';
    }

    init();
  </script>
</body>
</html>
