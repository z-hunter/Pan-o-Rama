<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Pan-o-Rama</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 0; background: #111; color: #eee; }
    .wrap { max-width: 480px; margin: 60px auto; background: #1b1b1b; border: 1px solid #333; border-radius: 10px; padding: 24px; }
    h1 { margin-top: 0; font-size: 22px; }
    .row { margin-bottom: 12px; }
    input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; box-sizing: border-box; }
    button { width: 100%; padding: 10px; border: 0; border-radius: 6px; background: #007bff; color: #fff; font-weight: 700; cursor: pointer; }
    .alt { margin-top: 10px; background: #333; }
    .msg { margin-top: 12px; color: #9ecbff; min-height: 18px; }
    a { color: #89c2ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="title">Reset Password</h1>
    <div id="requestMode">
      <div class="row"><input id="email" type="email" placeholder="Email" /></div>
      <button onclick="requestReset()">Send reset link</button>
    </div>
    <div id="resetMode" style="display:none;">
      <div class="row"><input id="newPassword" type="password" placeholder="New password (min 8)" /></div>
      <div class="row"><input id="confirmPassword" type="password" placeholder="Confirm new password" /></div>
      <button onclick="applyReset()">Update password</button>
    </div>
    <button class="alt" onclick="window.location.href='/login'">Back to login</button>
    <p class="msg" id="msg"></p>
  </div>
<script>
const params = new URLSearchParams(window.location.search);
const token = (params.get('token') || '').trim();

async function requestReset() {
  msg.textContent = '';
  const e = email.value.trim();
  if (!e) {
    msg.textContent = 'Enter your email first.';
    return;
  }
  const res = await fetch('/auth/password/forgot', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: e })
  });
  const data = await res.json().catch(() => ({}));
  msg.textContent = data.message || (res.ok ? 'If the account exists, reset link has been sent.' : (data.error || 'Request failed'));
}

async function applyReset() {
  msg.textContent = '';
  const p1 = newPassword.value;
  const p2 = confirmPassword.value;
  if (p1.length < 8) {
    msg.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (p1 !== p2) {
    msg.textContent = 'Passwords do not match.';
    return;
  }
  const res = await fetch('/auth/password/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, new_password: p1 })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    msg.textContent = data.error || 'Reset failed';
    return;
  }
  window.location.href = '/login?reset=1';
}

async function initMode() {
  if (!token) {
    title.textContent = 'Forgot Password';
    requestMode.style.display = 'block';
    resetMode.style.display = 'none';
    return;
  }
  title.textContent = 'Set New Password';
  requestMode.style.display = 'none';
  resetMode.style.display = 'block';

  try {
    const res = await fetch(`/auth/password/reset/validate?token=${encodeURIComponent(token)}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.valid) {
      msg.textContent = 'Reset link is invalid or expired.';
      resetMode.style.display = 'none';
      requestMode.style.display = 'block';
      title.textContent = 'Forgot Password';
    }
  } catch (_) {
    msg.textContent = 'Failed to validate reset link.';
  }
}

initMode();
</script>
</body>
</html>
