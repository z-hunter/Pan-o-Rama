<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Browse Tours - Lokalny Obiektyw</title>
    <link rel="stylesheet" href="/css/main.css" />
    <style>
        .projects-container { padding: 40px 0; }
        .project-card {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .project-thumb {
            aspect-ratio: 16/9;
            background-color: #000;
            background-size: cover;
            background-position: center;
        }
        .project-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .project-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/img/logo.png" alt="LO" />
            <span>Public Gallery</span>
        </div>
        <nav class="nav-links">
            <a href="/" class="nav-link">Studio</a>
            <a href="/projects.html" class="nav-link active">Browse</a>
            <a href="/login.html" class="btn btn-sm">Sign In</a>
        </nav>
    </header>

    <main class="container projects-container">
        <div style="text-align: center; margin-bottom: 48px;">
            <h1>Public Tour Gallery</h1>
            <p class="muted">Discover stunning virtual spaces created by our community</p>
        </div>

        <div id="loading" class="muted" style="text-align: center; padding: 48px;">Loading tours...</div>
        <div id="projectGrid" class="grid"></div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        async function fetchProjects() {
            try {
                const out = await apiFetch('/api/projects');
                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                if (!out || !out.res.ok) {
                    loading.style.display = 'block';
                    loading.textContent = 'Error loading tours.';
                    return;
                }

                const projects = out.data;
                const grid = document.getElementById('projectGrid');

                if (projects.length === 0) {
                    grid.innerHTML = '<div class="muted card" style="grid-column: 1/-1; text-align: center; padding: 48px;">No public tours yet.</div>';
                    return;
                }

                projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-card card';
                    
                    const thumbUrl = project.cover_url || '/img/placeholder.png';

                    card.innerHTML = `
                        <div class="project-thumb" style="background-image: url('${thumbUrl}')"></div>
                        <div class="project-content">
                            <h3 class="mb-2">${project.title || 'Untitled Tour'}</h3>
                            <p class="muted mb-4" style="font-size: 13px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                                ${project.description || 'No description provided.'}
                            </p>
                            <a href="${project.gallery_url}" class="btn btn-sm" style="margin-top: auto;" target="_blank">View Virtual Tour &rarr;</a>
                        </div>
                        <div class="project-footer">
                            <span class="muted" style="font-size: 12px;">by ${project.owner_name || 'Member'}</span>
                            <span class="muted" style="font-size: 12px;">${project.created_at || 'Recently'}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching tours:', error);
                document.getElementById('loading').textContent = 'Error loading tours.';
            }
        }

        fetchProjects();
    </script>
</body>
</html>
