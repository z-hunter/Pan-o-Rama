<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Browse Tours - Lokalny Obiektyw</title>
    <link rel="stylesheet" href="/css/main.css?v=5" />
    <style>
        .projects-container { padding: 40px 0; }
        
        /* Industrial Grid: 3 columns on PC */
        #projectGrid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(3, 1fr);
        }
        
        @media (max-width: 1024px) {
            #projectGrid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            #projectGrid { grid-template-columns: 1fr; }
        }

        .project-card {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            background: var(--surface);
            transition: border-color 0.2s;
            height: 100%;
        }
        .project-card:hover {
            border-color: var(--primary);
        }
        .project-thumb {
            aspect-ratio: 16/9;
            background-color: #050505;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border);
        }
        .project-content {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .project-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/img/logo.png" alt="LO" style="height: 32px; width: auto;" />
            <span>TOUR GALLERY</span>
        </div>
        <nav class="nav-links">
            <a href="/" class="nav-link">Studio</a>
            <a href="/projects.html" class="nav-link active">Browse</a>
            <a href="/login.html" class="btn btn-ghost btn-sm">Sign In</a>
        </nav>
    </header>

    <main class="container projects-container">
        <div style="text-align: center; margin-bottom: 48px;">
            <h1>Community Tours</h1>
            <p class="muted mono" style="font-size: 11px;">Explore virtual tours from our users</p>
        </div>

        <div id="loading" class="muted mono" style="text-align: center; padding: 60px;">LOADING...</div>
        <div id="projectGrid"></div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        async function fetchProjects() {
            try {
                const out = await apiFetch('/api/projects');
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';

                if (!out || !out.res.ok) {
                    if (loading) {
                        loading.style.display = 'block';
                        loading.textContent = 'PROTOCOL_ERROR: FAILED TO FETCH DATA.';
                    }
                    return;
                }

                const projects = out.data;
                const grid = document.getElementById('projectGrid');

                if (projects.length === 0) {
                    grid.innerHTML = '<div class="card" style="grid-column: 1/-1; padding: 80px; text-align: center; border-style: dashed; color: var(--text-muted); font-family: var(--font-mono);">EMPTY_GALLERY: NO PUBLIC TOURS AVAILABLE.</div>';
                    return;
                }

                projects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    
                    const thumbUrl = project.cover_image || '/img/placeholder.png';
                    const tourUrl = project.slug ? `/t/${project.slug}` : '#';

                    card.innerHTML = `
                        <div class="project-thumb" style="background-image: url('${thumbUrl}')"></div>
                        <div class="project-content">
                            <h3 class="mb-2" style="font-size: 15px;">${project.title || 'UNTITLED_SEQUENCE'}</h3>
                            <p class="muted mono mb-6" style="font-size: 11px; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                                ${project.description || 'NO_METADATA_AVAILABLE'}
                            </p>
                            <a href="${tourUrl}" class="btn btn-primary btn-sm" style="width: 100%;" target="_blank">ENGAGE &rarr;</a>
                        </div>
                        <div class="project-footer">
                            <span class="mono" style="font-size: 10px; color: var(--text-muted);">OP: ${project.owner_id ? project.owner_id.slice(0,8) : 'ANON'}</span>
                            <span class="mono" style="font-size: 10px; color: var(--text-muted);">${project.created_at ? project.created_at.slice(0,10) : 'RECENT'}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching tours:', error);
                const loading = document.getElementById('loading');
                if (loading) loading.textContent = 'SYSTEM_CRASH: UNEXPECTED EXCEPTION.';
            }
        }

        fetchProjects();
    </script>
</body>
</html>
