<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin Analytics - Lokalny Obiektyw</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .analytics-container { padding: 40px 0; max-width: 900px; }
    .stat-card {
      padding: 20px;
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #loginBox { max-width: 400px; margin: 80px auto; }
    #statsBox { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="/img/logo.png" alt="LO" style="height: 32px; width: auto;" />
      <span>Admin Analytics</span>
    </div>
    <nav class="nav-links">
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
      <button class="btn btn-ghost btn-sm" onclick="adminLogout()">Lock</button>
    </nav>
  </header>

  <main class="container analytics-container">
    <div id="loginBox" class="card">
      <h2 class="mb-4">Unlock Analytics</h2>
      <p class="muted mb-8">Please enter the administrator password to view metrics.</p>
      <div class="mb-4">
        <input id="adminPassword" type="password" placeholder="Admin password" />
      </div>
      <button class="btn" style="width: 100%;" onclick="adminLogin()">Unlock Dashboard</button>
      <p id="loginMsg" class="muted mt-4" style="text-align: center;"></p>
    </div>

    <div id="statsBox">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1>Product Metrics</h1>
          <p class="muted" id="statsAmount">Global performance overview</p>
        </div>
        <div class="flex gap-2">
          <select id="statsPeriod" style="width: auto;" onchange="loadStats()">
            <option value="week" selected>Last 7 days</option>
            <option value="month">Last 30 days</option>
            <option value="all">All time</option>
          </select>
          <button class="btn btn-ghost" onclick="loadStats()">Refresh</button>
        </div>
      </div>

      <div class="grid">
        <div class="card stat-card">
          <div class="stat-value" id="stTourUnique">-</div>
          <div class="stat-label">Tour Visitors</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stTourTime">-</div>
          <div class="stat-label">Engagement Time</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stHomeUnique">-</div>
          <div class="stat-label">Home Visitors</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stToursCreated">-</div>
          <div class="stat-label">Tours Created</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stUsersReg">-</div>
          <div class="stat-label">New Users</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stCheckouts">-</div>
          <div class="stat-label">Checkouts</div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    function showLocked(msg = '') {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('statsBox').style.display = 'none';
      document.getElementById('loginMsg').textContent = msg || '';
    }

    function showUnlocked() {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('statsBox').style.display = 'block';
    }

    function fmtDuration(totalSec) {
      const s = Math.max(0, Number(totalSec) || 0);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    async function adminLogin() {
      const password = (document.getElementById('adminPassword').value || '').trim();
      if (!password) return;
      
      const out = await apiFetch('/api/admin/analytics/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      if (out && out.res.ok) {
        showUnlocked();
        loadStats();
      } else {
        document.getElementById('loginMsg').textContent = out?.data?.error || 'Login failed';
      }
    }

    async function adminLogout() {
      await apiFetch('/api/admin/analytics/logout', { method: 'POST' });
      showLocked('Locked');
    }

    async function loadStats() {
      const period = document.getElementById('statsPeriod').value;
      const out = await apiFetch(`/api/admin/analytics/summary?period=${encodeURIComponent(period)}`);
      
      if (!out) return;
      if (out.res.status === 401) {
        showLocked('Session expired.');
        return;
      }
      if (!out.res.ok) {
        showToast('Failed to load stats', 'error');
        return;
      }

      showUnlocked();
      const d = out.data || {};
      document.getElementById('stTourUnique').textContent = d.tour_visitors_unique ?? 0;
      document.getElementById('stTourTime').textContent = fmtDuration(d.tour_time_total_sec ?? 0);
      document.getElementById('stHomeUnique').textContent = d.home_visitors_unique ?? 0;
      document.getElementById('stToursCreated').textContent = d.tours_created ?? 0;
      document.getElementById('stUsersReg').textContent = d.users_registered ?? 0;
      document.getElementById('stCheckouts').textContent = d.checkouts_count ?? 0;
      
      const totalUsd = Number(d.checkouts_amount_total_cents || 0) / 100;
      document.getElementById('statsAmount').textContent = `Total Revenue: $${totalUsd.toFixed(2)}`;
    }

    loadStats();
  </script>
</body>
</html>
