<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dashboard - Lokalny Obiektyw</title>
  <link rel="stylesheet" href="/css/main.css?v=5" />
  <style>
    .dashboard-container {
      padding: 32px 0;
    }
    
    /* Optimized Grid: strictly 3 columns on desktop */
    #tours-grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(3, 1fr);
    }
    
    @media (max-width: 1024px) {
      #tours-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      #tours-grid { grid-template-columns: 1fr; }
    }

    .tour-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color 0.2s;
    }
    .tour-card:hover {
      border-color: var(--primary);
    }
    .tour-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background-color: #050505;
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid var(--border);
      position: relative; /* Fixed: keeps badges inside the thumb */
    }
    .tour-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .tour-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }
    .tour-footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #080808;
    }

    /* Header Plan Info */
    .header-plan-info {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-right: 24px;
      padding-right: 24px;
      border-right: 1px solid var(--border);
    }
    
    .header-progress-wrap {
      width: 100px;
      height: 4px;
      background: #222;
      position: relative;
      overflow: hidden;
    }
    .header-progress-fill {
      position: absolute;
      left: 0; top: 0; height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.5s;
    }

    /* Modal Tweaks */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="/img/logo.png" alt="LO" />
      <span>STUDIO_DASHBOARD</span>
    </div>
    
    <div class="flex items-center">
      <div class="header-plan-info" id="plan-header-info">
        <div class="flex flex-column items-end">
          <span class="badge" id="plan-badge" style="font-size: 9px; margin-bottom: 4px;">PLAN</span>
          <span class="mono" id="plan-usage" style="font-size: 10px; color: var(--text-muted);">QUOTA: 0/0</span>
        </div>
        <div class="header-progress-wrap">
          <div class="header-progress-fill" id="plan-progress"></div>
        </div>
      </div>
      
      <nav class="nav-links">
        <a href="/dashboard.html" class="nav-link active">Tours</a>
        <a href="/account.html" class="nav-link">Account</a>
        <button class="btn btn-ghost btn-sm" onclick="logout()">LOGOUT</button>
      </nav>
    </div>
  </header>

  <main class="container dashboard-container">
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 style="font-size: 24px;">Project Library</h1>
        <p class="muted mono" style="font-size: 11px;">Operator: <span id="user-name">...</span></p>
      </div>
      <button class="btn btn-primary" onclick="showCreateModal()">
        + NEW TOUR
      </button>
    </div>

    <div id="tours-grid">
      <!-- Tours loaded via JS -->
    </div>
  </main>

  <div id="create-modal" class="modal-overlay" onclick="closeCreateModal()">
    <div class="modal-content card" onclick="event.stopPropagation()">
      <h2 class="mb-6">New Sequence</h2>
      <form onsubmit="handleCreateTour(event)">
        <div class="mb-4">
          <label class="block mb-1">Title</label>
          <input id="title" placeholder="IDENTIFIER" required />
        </div>
        <div class="mb-4">
          <label class="block mb-1">Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <div class="mb-6">
          <label class="block mb-1">Access Protocol</label>
          <select id="visibility">
            <option value="public">Public</option>
            <option value="private">Private (Restricted)</option>
          </select>
        </div>
        <div class="flex gap-4">
          <button type="button" class="btn btn-secondary" style="flex:1;" onclick="closeCreateModal()">ABORT</button>
          <button type="submit" class="btn btn-primary" style="flex:1;">COMMENCE</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentPlan = null;

    async function init() {
      const out = await apiFetch('/me');
      if (!out || !out.res.ok) return;
      
      const u = out.data;
      document.getElementById('user-name').textContent = u.display_name?.toUpperCase() || 'UNKNOWN';
      
      const plan = u.plan || {};
      const ent = u.entitlements || {};
      const usage = u.usage || {};
      currentPlan = plan.id;
      
      document.getElementById('plan-badge').textContent = plan.name?.toUpperCase();
      document.getElementById('plan-usage').textContent = `QUOTA: ${usage.tours_count}/${ent.max_tours}`;
      
      const ratio = ent.max_tours > 0 ? (usage.tours_count / ent.max_tours) * 100 : 0;
      document.getElementById('plan-progress').style.width = `${Math.min(100, ratio)}%`;

      loadTours();
    }

    async function loadTours() {
      const grid = document.getElementById('tours-grid');
      grid.innerHTML = '<div class="muted mono">Syncing...</div>';

      const out = await apiFetch('/tours/my');
      if (!out || !out.res.ok) return;

      const tours = out.data.tours || [];
      if (tours.length === 0) {
        grid.innerHTML = '<div class="card" style="grid-column: 1/-1; padding: 80px; text-align: center; border-style: dashed; color: var(--text-muted); font-family: var(--font-mono);">EMPTY_LIBRARY: NO TOURS FOUND.</div>';
        return;
      }

      grid.innerHTML = '';
      tours.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tour-card';
        
        const visibility = t.visibility === 'private' ? '[PRIVATE]' : '[PUBLIC]';
        const badgeClass = t.visibility === 'private' ? 'badge-warning' : 'badge-success';

        card.innerHTML = `
          <div class="tour-thumb" style="background-image: url('${t.cover_image || '/img/placeholder.png'}')">
            <div style="position: absolute; top: 12px; right: 12px;">
              <span class="badge ${badgeClass}">${visibility}</span>
            </div>
          </div>
          <div class="tour-content">
            <h3 class="mb-2" style="font-size: 14px;">${t.title}</h3>
            <p class="muted mono" style="font-size: 11px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px;">
              ${t.description || 'NO_DESCRIPTION'}
            </p>
            <div class="tour-actions">
              <button class="btn btn-primary btn-sm" onclick="openStudio('${t.id}')">STUDIO</button>
              <button class="btn btn-secondary btn-sm" onclick="window.open('/t/${t.slug}', '_blank')">VIEW</button>
            </div>
          </div>
          <div class="tour-footer">
            <span class="mono" style="font-size: 10px; color: var(--text-muted); opacity: 0.5;">ID: ${t.slug.slice(0,8)}</span>
            <button class="btn btn-ghost btn-sm" style="color: var(--danger); border: 0; padding: 0;" onclick="deleteTour('${t.id}')">[DELETE]</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function showCreateModal() { document.getElementById('create-modal').style.display = 'flex'; }
    function closeCreateModal() { document.getElementById('create-modal').style.display = 'none'; }

    async function handleCreateTour(e) {
      e.preventDefault();
      const payload = {
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim(),
        visibility: document.getElementById('visibility').value
      };
      const out = await apiFetch('/tours', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (out && out.res.ok) {
        showToast('TOUR_INITIALIZED');
        closeCreateModal();
        init();
      }
    }

    async function deleteTour(id) {
      if (!confirm('CONFIRM_PURGE?')) return;
      const out = await apiFetch(`/tours/${id}`, { method: 'DELETE' });
      if (out && out.res.ok) {
        showToast('PURGE_COMPLETE');
        loadTours();
      }
    }

    function openStudio(id) { window.location.href = `/?tour_id=${encodeURIComponent(id)}`; }

    init();
  </script>
</body>
</html>
