<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dashboard - Lokalny Obiektyw</title>
  <link rel="stylesheet" href="/css/main.css?v=7" />
  <style>
    body {
      background-image: none !important; /* Remove giant logo */
    }
    .dashboard-container {
      padding: 48px 0;
    }
    
    /* Header Layout Fix */
    .header-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .header-plan-info {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-right: 24px;
      border-right: 1px solid rgba(72, 72, 71, 0.3);
    }
    
    .quota-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* Fixed Grid: Center items and prevent stretching */
    #tours-grid {
      display: grid;
      gap: 32px;
      grid-template-columns: repeat(auto-fill, 340px);
      justify-content: center;
      margin-top: 40px;
    }

    .tour-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
      border: 1px solid rgba(72, 72, 71, 0.2);
      transition: 0.2s;
      max-width: 100%;
    }
    .tour-card:hover {
      border-color: var(--primary);
      background: var(--bg-surface);
    }
    .tour-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background-color: #000;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .tour-content {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .tour-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .tour-footer {
      padding: 12px 20px;
      background: rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(72, 72, 71, 0.1);
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <img src="/img/logo.png" alt="LO" style="height: 32px; width: auto; flex-shrink: 0;" />
      <span style="letter-spacing: 2px;">STUDIO_DASHBOARD</span>
    </div>
    
    <div class="header-right">
      <div class="header-plan-info" id="plan-header-info">
        <div class="quota-box">
          <span class="badge" id="plan-badge">PLAN</span>
          <span class="label-technical mt-1" id="plan-usage" style="color: var(--primary);">QUOTA: 0/0</span>
        </div>
        <div style="width: 80px; height: 2px; background: #222;">
          <div id="plan-progress" style="height: 100%; background: var(--primary); width: 0%;"></div>
        </div>
      </div>
      
      <nav class="nav-links">
        <a href="/dashboard.html" class="nav-link active">Tours</a>
        <a href="/projects.html" class="nav-link">Gallery</a>
        <a href="/account.html" class="nav-link">Account</a>
        <button class="btn btn-ghost btn-sm" style="opacity: 0.5;" onclick="logout()">Logout</button>
      </nav>
    </div>
  </header>

  <main class="container dashboard-container">
    <div class="flex justify-between items-end">
      <div>
        <h1 style="font-size: 28px; color: var(--text);">Project Library</h1>
        <p class="label-technical" style="margin-top: 8px;">User: <span id="user-name" style="color: var(--text);">...</span></p>
      </div>
      <button class="btn btn-primary" onclick="showCreateModal()">
        + NEW TOUR
      </button>
    </div>

    <div id="tours-grid">
      <!-- Content via JS -->
    </div>
  </main>

  <div id="create-modal" class="modal-overlay" onclick="closeCreateModal()">
    <div class="modal-content card" style="max-width: 400px;" onclick="event.stopPropagation()">
      <h2 class="mb-8">New Tour</h2>
      <form onsubmit="handleCreateTour(event)">
        <div class="mb-6">
          <label class="label-technical block mb-2">Tour Name</label>
          <input id="title" placeholder="e.g. My Apartment" required />
        </div>
        <div class="mb-6">
          <label class="label-technical block mb-2">Description</label>
          <textarea id="description" rows="2"></textarea>
        </div>
        <div class="mb-10">
          <label class="label-technical block mb-2">Privacy Settings</label>
          <select id="visibility">
            <option value="public">Public</option>
            <option value="private">Private</option>
          </select>
        </div>
        <div class="flex gap-4">
          <button type="button" class="btn btn-secondary" style="flex:1;" onclick="closeCreateModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex:1;">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentPlan = null;

    async function init() {
      const out = await apiFetch('/me');
      if (!out || !out.res.ok) return;
      const u = out.data;
      document.getElementById('user-name').textContent = u.display_name?.toUpperCase() || 'USER';
      const plan = u.plan || {};
      const ent = u.entitlements || {};
      const usage = u.usage || {};
      currentPlan = plan.id;
      document.getElementById('plan-badge').textContent = plan.name?.toUpperCase();
      document.getElementById('plan-usage').textContent = `QUOTA: ${usage.tours_count}/${ent.max_tours}`;
      const ratio = ent.max_tours > 0 ? (usage.tours_count / ent.max_tours) * 100 : 0;
      document.getElementById('plan-progress').style.width = `${Math.min(100, ratio)}%`;
      loadTours();
    }

    async function loadTours() {
      const grid = document.getElementById('tours-grid');
      grid.innerHTML = '<div class="label-technical">Loading tours...</div>';
      const out = await apiFetch('/tours/my');
      if (!out || !out.res.ok) return;
      const tours = out.data.tours || [];
      if (tours.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">You haven\'t created any tours yet.</div>';
        return;
      }
      grid.innerHTML = '';
      tours.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tour-card';
        const isPrivate = t.visibility === 'private';
        card.innerHTML = `
          <div class="tour-thumb" style="background-image: url('${t.cover_image || '/img/placeholder.png'}')">
            <div style="position: absolute; top: 12px; right: 12px;">
              <span class="badge ${isPrivate?'':'badge-success'}">${isPrivate?'[PRIVATE]':'[PUBLIC]'}</span>
            </div>
          </div>
          <div class="tour-content">
            <h3 class="mb-2" style="font-size: 16px;">${t.title}</h3>
            <p class="muted mono" style="font-size: 11px; flex: 1; margin-bottom: 12px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
              ${t.description || 'No description provided.'}
            </p>
            <div class="tour-actions">
              <button class="btn btn-primary btn-sm" onclick="openStudio('${t.id}')">STUDIO</button>
              <button class="btn btn-secondary btn-sm" onclick="window.open('/t/${t.slug}', '_blank')">VIEW</button>
            </div>
          </div>
          <div class="tour-footer">
            <span class="label-technical" style="font-size: 9px; opacity: 0.5;">ID: ${t.slug.slice(0,10)}</span>
            <button class="btn btn-ghost btn-sm" style="color: var(--danger); font-size: 10px; border: 0; padding: 0;" onclick="deleteTour('${t.id}')">[DELETE]</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function showCreateModal() { document.getElementById('create-modal').style.display = 'flex'; }
    function closeCreateModal() { document.getElementById('create-modal').style.display = 'none'; }

    async function handleCreateTour(e) {
      e.preventDefault();
      console.log("Creating tour...");
      try {
        const out = await apiFetch('/tours', { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ 
            title: document.getElementById('title').value.trim(), 
            description: document.getElementById('description').value.trim(), 
            visibility: document.getElementById('visibility').value 
          }) 
        });
        console.log("Create response:", out);
        if (out && out.res.ok) { 
          showToast('Tour Created', 'success'); 
          closeCreateModal(); 
          init(); 
        } else {
          showToast(out?.data?.error || 'Failed to create tour', 'error');
        }
      } catch (err) {
        console.error("Create error:", err);
        showToast("System error during creation", "error");
      }
    }

    async function deleteTour(id) {
      if (!confirm('Are you sure you want to delete this tour?')) return;
      const out = await apiFetch(`/tours/${id}`, { method: 'DELETE' });
      if (out && out.res.ok) { showToast('Tour Deleted'); loadTours(); }
    }

    function openStudio(id) { window.location.href = `/?tour_id=${encodeURIComponent(id)}`; }
    init();
  </script>
</body>
</html>
