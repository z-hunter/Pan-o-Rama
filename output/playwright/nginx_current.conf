server {
    listen 80;
    listen [::]:80;
    server_name pan-o-rama.online www.pan-o-rama.online 57.128.228.75;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pan-o-rama.online www.pan-o-rama.online 57.128.228.75;
    client_max_body_size 512M;

    ssl_certificate     /etc/nginx/ssl/pan-o-rama.online.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pan-o-rama.online.key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /home/debian/lokalny_obiektyw/frontend;
    index index.html;

    location /galleries/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location ~ ^/(auth|me|tours|scenes|hotspots|gallery|t|api|billing)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location = /all-projects { proxy_pass http://127.0.0.1:8000/all-projects; }
    location = /login { proxy_pass http://127.0.0.1:8000/login; }
    location = /dashboard { proxy_pass http://127.0.0.1:8000/dashboard; }
    location = /account { proxy_pass http://127.0.0.1:8000/account; }
    location = /reset-password { proxy_pass http://127.0.0.1:8000/reset-password; }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
